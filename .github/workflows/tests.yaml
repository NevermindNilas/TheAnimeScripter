name: Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.12"
          # Cache pip's wheel store; key tracks this workflow (where deps are pinned).
          cache: pip
          cache-dependency-path: .github/workflows/tests.yaml

      # Pure-logic tests need only the standard library plus packaging (for the
      # dependency version checks). Pinned so the pip cache key stays stable.
      # The torch/cv2-backed motion-blur tests skip themselves via importorskip.
      - name: Install test dependencies
        run: pip install pytest==9.0.3 packaging==26.0

      - name: Run unit tests
        run: python -m pytest tests/ -q
