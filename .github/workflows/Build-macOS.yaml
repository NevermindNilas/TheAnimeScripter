name: Build-macOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "build.py"
      - "extra-requirements-macos.txt"
      - "requirements.txt"
      - "pyproject.toml"
      - "src/**"
      - "main.py"
      - ".github/workflows/Build-macOS.yaml"

permissions:
  contents: write

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13.12"

      - name: Extract version
        id: get_version
        run: |
          version=$(python -c 'import src.version; print(src.version.__version__)')
          version_nodots=${version//./}
          echo "version=${version}" >> $GITHUB_OUTPUT
          echo "version_nodots=${version_nodots}" >> $GITHUB_OUTPUT

      - name: Run full build script
        run: python build.py

      - name: Compress full directory
        run: |
          cd "${{ github.workspace }}/dist-portable/main/"
          tar -czf "../../TAS-${{ steps.get_version.outputs.version_nodots }}-macOS-arm64.tar.gz" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TAS-${{ steps.get_version.outputs.version_nodots }}-macOS-arm64
          path: TAS-${{ steps.get_version.outputs.version_nodots }}-macOS-arm64.tar.gz
          if-no-files-found: error
